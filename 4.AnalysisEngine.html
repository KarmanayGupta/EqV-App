
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EquiValic | Analysis Metrics</title>

    <style>
      :root {
        --bg: #0c0f14;
        --sidebar-bg: #0f141b;
        --panel-bg: #141a24;
        --panel-bg-light: #1c2230;
        --border: rgba(255, 255, 255, 0.07);
        --text-primary: #f1f3f8;
        --text-muted: #8f9bad;
        --accent-1: #6c5ce7;
        --accent-2: #00d4ff;
        --danger: #ff4d4f;
        --radius: 14px;
      }

      /* Base */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Inter", sans-serif;
      }
      body {
        background: var(--bg);
        color: var(--text-primary);
        height: 100vh;
        display: flex;
        overflow: hidden;
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background: radial-gradient(
            circle at 25% 30%,
            rgba(108, 92, 231, 0.18),
            transparent 45%
          ),
          radial-gradient(
            circle at 75% 70%,
            rgba(0, 212, 255, 0.12),
            transparent 45%
          );
        animation: drift 16s ease-in-out infinite alternate;
        z-index: -1;
      }
      @keyframes drift {
        0% {
          transform: scale(1);
        }
        100% {
          transform: scale(1.05);
        }
      }

      /* Sidebar */
      .sidebar {
        width: 240px;
        background: var(--sidebar-bg);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 32px 20px;
      }
      .logo {
        font-weight: 800;
        font-size: 22px;
        margin-bottom: 48px;
      }
      /* Unified Navigation Typography */
      .nav-item,
.sub-nav {
  position: relative;
  cursor: pointer;
  transition: all 0.2s ease;
  border-radius: 10px;
  margin-bottom: 12px; 
}
.nav-item {
        padding: 12px 16px;
        border-radius: 10px;
        font-size: 14px;
        color: var(--text-muted);
        margin-bottom: 6px;
      }
      .nav-item.active {
        background: linear-gradient(
          90deg,
          rgba(108, 92, 231, 0.18),
          transparent
        );
        color: var(--accent-2);
        border-left: 3px solid var(--accent-1);
      }

      /* Layout */
      .app {
        flex: 1;
        display: flex;
        flex-direction: column;
      }
      .continuity {
        height: 56px;
        padding: 0 48px;
        display: flex;
        align-items: center;
        font-size: 13px;
        color: var(--text-muted);
        border-bottom: 1px solid var(--border);
        background: rgba(17, 22, 31, 0.75);
      }
      .continuity span {
        color: var(--accent-2);
        font-weight: 600;
      }

      .workspace {
        flex: 1;
        display: grid;
        grid-template-columns: 240px 1fr;
        gap: 40px;
        padding: 48px;
        overflow: hidden;
      }

      /* Left Panel */
      .left-panel {
        background: var(--panel-bg);
        border-radius: var(--radius);
        padding: 32px 28px;
        border: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        gap: 12px;
        position: relative;
      }
      .sub-nav {
        font-family: "Inter", sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
        padding: 12px 16px;
        border-radius: 10px;
        color: var(--text-muted);
      }
      .sub-nav.active {
        background: linear-gradient(
          90deg,
          rgba(108, 92, 231, 0.18),
          transparent
        );
        color: var(--accent-2);
        border-left: 3px solid var(--accent-1);
      }

      /* Display */
      .display-panel {
        background: var(--panel-bg-light);
        border-radius: var(--radius);
        padding: 32px 48px;
        border: 1px solid var(--border);
        box-shadow: 0 0 60px rgba(0, 0, 0, 0.25);
        display: flex;
        flex-direction: column;
        height: 100%;
        overflow: hidden;
      }

      /* Tabs */
      .dashboard-tabs {
  display: flex;
  gap: 28px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  margin-bottom: 22px;
  padding-bottom: 4px;
}

.tab {
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 14px;
  font-weight: 600;
  padding: 8px 0;
  cursor: pointer;
  position: relative;
  transition: 0.25s ease;
}

.tab:hover {
  color: var(--text-primary);
}

.tab.active {
  color: var(--accent-2);
}

.tab.active::after {
  content: "";
  position: absolute;
  bottom: -6px;
  left: 0;
  width: 100%;
  height: 2px;
  background: var(--accent-2);
  border-radius: 2px;
}

      /* Scroll */
      .scroll-container {
  flex: 1;
  overflow-y: auto;
  padding-right: 6px;
}

      /* Stats */
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 24px;
        margin-bottom: 32px;
      }
      .stat-card {
        background: linear-gradient(
          145deg,
          rgba(108, 92, 231, 0.15),
          rgba(0, 212, 255, 0.05)
        );
        border: 1px solid var(--accent-1);
        border-radius: var(--radius);
        padding: 28px 20px;
        text-align: center;
      }
      .stat-value {
        font-size: 42px;
        font-weight: 800;
        color: #ffffff;
      }
      .stat-label {
        font-size: 14px;
        color: var(--text-muted);
      }

      /* Charts */
      .chart-wrapper {
        background: rgb(255, 248, 232);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 24px;
        margin-bottom: 24px;
      }
      .chart-container {
        height: 260px;
      }
      .chart-wrapper h4 {
  color: #000;
  font-weight: 700;
  margin-bottom: 16px;
}

      /* Graph */
      .graph-container {
        width: 100%;
        height: 450px;
        background: rgb(255, 248, 232);
        border-radius: var(--radius);
        border: 1px solid var(--border);
        cursor: zoom-in;
        overflow: hidden;
      }
      .graph-container svg {
        width: 100%;
        height: 100%;
        transition: 0.4s;
      }
      .graph-container.zoomed svg {
        transform: scale(1.4);
        cursor: zoom-out;
      }
      .node {
        fill: var(--accent-1);
      }
      .node:hover {
        fill: var(--accent-2);
      }


      /* Risk */

.risk-list {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.risk-item {
  background: linear-gradient(
    90deg,
    rgba(12,18,32,0.95),
    rgba(18,26,42,0.95)
  );
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: 16px;
  padding: 14px 22px;  
}

.risk-row {
  display: flex;
  justify-content: space-between;
  align-items: center;  
}

.risk-text {
  display: flex;
  flex-direction: column;
  gap: 6px;           
}

.risk-title {
  font-size: 16px;
  font-weight: 700;
  color: #27d3ff;
}

.risk-desc {
  font-size: 14px;
  color: #9aa7b8;
}

.risk-value {
  font-size: 30px;        
  font-weight: 800;
  color: #fff9f9;
  line-height: 1;
}
      /* Bottom */
      .system-bar {
        height: 50px;
        border-top: 1px solid var(--border);
        background: #111722;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 48px;
        font-size: 13px;
        color: var(--text-muted);
      }

      .folder {
  cursor: pointer;
  margin-bottom: 8px;
  font-weight: 600;
  color: var(--text-primary);
}

.folder-inner {
  margin-left: 16px;
  margin-top: 6px;
  display: none;
}

.folder.open > .folder-inner {
  display: block;
}

.file:hover {
  color: var(--accent-2);
  transition: 0.2s ease;
}
.file {
  margin-left: 22px;
  font-size: 13px;
  color: var(--text-muted);
  padding: 6px 0;
  cursor: pointer;

  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.fade-transition {
  opacity: 1;
  transition: opacity 0.25s ease;
}

.fade-transition.fade-out {
  opacity: 0;
}
.sidebar-animate {
  animation: sidebarSwap 0.3s ease;
}
/* ================= VS CODE STYLE TREE ================= */

.tree {
  font-size: 14px;
  line-height: 1.6;
}

.tree-item {
  position: relative;
}

.tree-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 4px 0;
  cursor: pointer;
}

.tree-row:hover {
  color: var(--accent-2);
}

/* Arrow */
.arrow {
  width: 14px;
  display: flex;
  justify-content: center;
  font-size: 11px;
  color: var(--text-muted);
  transition: transform 0.2s ease;
}

.arrow::before {
  content: "▶";
}

.folder.open > .tree-row .arrow::before {
  content: "▼";
}

/* Children container */
.tree-children {
  margin-left: 14px;
  padding-left: 12px;
  border-left: 1px solid rgba(255,255,255,0.08); 
  display: none;
}

.folder.open > .tree-children {
  display: block;
}

/* File styling */
.file {
  padding: 4px 0;
  font-size: 13px;
  color: var(--text-muted);
  cursor: pointer;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.file:hover {
  color: var(--accent-2);
}

@keyframes sidebarSwap {
  0% { opacity: 0; transform: translateX(-10px); }
  100% { opacity: 1; transform: translateX(0); }
}

/* ================= INTERACTIVE BUTTON EFFECT ================= */

.nav-item,
.sub-nav {
  position: relative;
  cursor: pointer;
  transition: all 0.2s ease;
  border-radius: 10px;
}

.nav-item:hover,
.sub-nav:hover {
  background: rgba(255, 255, 255, 0.05);
  color: var(--text-primary);
  transform: translateX(4px);
}

.nav-item:active,
.sub-nav:active {
  transform: scale(0.97);
}

/* Subtle ripple effect */
.nav-item::after,
.sub-nav::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 10px;
  background: rgba(255,255,255,0.08);
  opacity: 0;
  transition: opacity 0.2s ease;
}

.nav-item:active::after,
.sub-nav:active::after {
  opacity: 1;
}

/*Project Summary Styles*/

.pill.orange {

/* Empty states */

/* ===== DIAGNOSTICS ===== */

.diag-stats {

}

.diag-stat {

/* 4 column table (External calls) */

.diag-stat.stat-card {

.chart-wrapper.dark {

.chart-wrapper.dark h4 {

      let charts = [];

      function destroyCharts() {
        charts.forEach((c) => c.destroy());
        charts = [];
      }

      
      function attachDashboardTabEvents() {
  const tabs = document.querySelectorAll(".tab");
  const indicator = document.querySelector(".tab-indicator");

  function positionIndicator(tab) {
    if (!indicator || !tab) return;
    indicator.style.width = tab.offsetWidth + "px";
    indicator.style.left = tab.offsetLeft + "px";
  }

  tabs.forEach((tab) => {
    tab.addEventListener("click", () => {
      tabs.forEach((t) => t.classList.remove("active"));
      tab.classList.add("active");

      positionIndicator(tab);
      updateView(tab.dataset.view);
    });
  });

  const activeTab = document.querySelector(".tab.active");
  positionIndicator(activeTab);
}
